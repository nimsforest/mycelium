{{define "content"}}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-canopy">Overview</h1>
</div>

<div id="stats" hx-get="/dashboard/" hx-trigger="every 5s" hx-select="#stats" hx-swap="outerHTML">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
        <div class="bg-forest-card rounded-xl border border-sprout/30 p-5">
            <div class="flex items-center gap-3 mb-2">
                <span class="stat-label text-xs text-soil/60 uppercase tracking-wider">Operator</span>
            </div>
            <div class="stat-value text-xl font-bold {{if eq .Data.OperatorStatus "active"}}text-forest-green{{else}}text-red-500{{end}}">{{.Data.OperatorStatus}}</div>
        </div>
        <a href="/dashboard/accounts" class="block bg-forest-card rounded-xl border border-sprout/30 p-5 hover:border-forest-green/50 transition-colors">
            <div class="flex items-center gap-3 mb-2">
                <span class="stat-label text-xs text-soil/60 uppercase tracking-wider">Accounts</span>
            </div>
            <div class="stat-value text-3xl font-bold text-solar-gold">{{.Data.AccountCount}}</div>
        </a>
        <a href="/dashboard/credentials" class="block bg-forest-card rounded-xl border border-sprout/30 p-5 hover:border-forest-green/50 transition-colors">
            <div class="flex items-center gap-3 mb-2">
                <span class="stat-label text-xs text-soil/60 uppercase tracking-wider">Credentials</span>
            </div>
            <div class="stat-value text-3xl font-bold text-solar-gold">{{.Data.CredentialCount}}</div>
        </a>
    </div>
</div>
{{end}}
