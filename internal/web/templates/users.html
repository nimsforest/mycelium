{{define "content"}}
<div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold text-canopy">Users</h1>
</div>

<div class="bg-forest-card rounded-xl border border-sprout/30 p-6 mb-8">
    <h2 class="text-lg font-semibold text-canopy mb-4">Add a user</h2>
    <form hx-post="/users/create" hx-swap="none" class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-xs text-soil/70 mb-1 font-ui">Email</label>
            <input type="email" name="email" required placeholder="name@example.com"
                class="font-ui bg-forest-bg border border-sprout/30 rounded-lg px-3 py-2 text-sm text-canopy placeholder-soil/40 focus:outline-none focus:border-forest-green/50 w-64">
        </div>
        <div>
            <label class="block text-xs text-soil/70 mb-1 font-ui">Name</label>
            <input type="text" name="name" placeholder="Jane Doe"
                class="font-ui bg-forest-bg border border-sprout/30 rounded-lg px-3 py-2 text-sm text-canopy placeholder-soil/40 focus:outline-none focus:border-forest-green/50 w-56">
        </div>
        <button type="submit"
            class="font-ui bg-forest-green text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-forest-green-dark transition-colors">
            Add
        </button>
    </form>
</div>

<div id="user-list" hx-get="/users" hx-trigger="every 5s" hx-select="#user-list" hx-swap="outerHTML">
    {{if .Data.Users}}
    <div class="bg-forest-card rounded-xl border border-sprout/30 overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-sprout/20">
                    <th class="text-left px-5 py-3 text-xs text-soil/60 uppercase tracking-wider font-medium">Name</th>
                    <th class="text-left px-5 py-3 text-xs text-soil/60 uppercase tracking-wider font-medium">Email</th>
                    <th class="text-left px-5 py-3 text-xs text-soil/60 uppercase tracking-wider font-medium">ID</th>
                    <th class="text-left px-5 py-3 text-xs text-soil/60 uppercase tracking-wider font-medium">Joined</th>
                </tr>
            </thead>
            <tbody>
                {{range .Data.Users}}
                <tr class="border-b border-sprout/10 last:border-0">
                    <td class="px-5 py-3 text-canopy font-medium">
                        <a href="/users/{{.ID}}" class="hover:text-forest-green transition-colors">{{if .Name}}{{.Name}}{{else}}—{{end}}</a>
                    </td>
                    <td class="px-5 py-3 text-soil/70">{{.Email}}</td>
                    <td class="px-5 py-3 text-soil/50 font-ui text-xs">{{.ID}}</td>
                    <td class="px-5 py-3 text-soil/50 font-ui text-xs" title="{{formatTimestamp .CreatedAt}}">{{timeAgo .CreatedAt}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
    {{else}}
    <p class="text-soil/60 italic">No users yet. A network begins with its first connection.</p>
    {{end}}
</div>
{{end}}
